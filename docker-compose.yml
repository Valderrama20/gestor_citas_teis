services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: gestor_citas_db_container
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: abc123.
      MARIADB_DATABASE: gestor_citas_db
      MARIADB_USER: admin
      MARIADB_PASSWORD: abc123.
    ports:
      - "3306:3306"
    volumes:
      # Este volumen asegura que tus datos no se borren al apagar el contenedor
      - mariadb_data:/var/lib/mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:9001
    container_name: gestor_citas_frontend_container
    restart: always
    ports:
      - "5173:80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestor_citas_backend_container
    restart: always
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/gestor_citas_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: abc123.
      SERVER_PORT: 9001
    ports:
      - "9001:9001"
    depends_on:
      - db

volumes:
  mariadb_data:
