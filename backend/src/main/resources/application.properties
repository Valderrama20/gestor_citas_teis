spring.application.name=gestor_citas
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]
SERVER.PORT=${SERVER_PORT:9001}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.default-encoding=UTF-8
mail.from=${MAIL_FROM:${spring.mail.username}}
citas.cancelacion.secret=${CANCEL_TOKEN_SECRET:dev-cancel-secret-change-me-please}
citas.cancelacion.issuer=${CANCEL_TOKEN_ISSUER:gestor_citas}
citas.cancelacion.frontend-url=${CANCEL_FRONTEND_URL:http://localhost:5173/citas/cancelar}
W