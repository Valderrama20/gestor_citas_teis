services:
  frontend:
    build:
      args:
        VITE_API_URL: ${LOCAL_VITE_API_URL:-http://localhost:9001}
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"

  backend:
    ports:
      - "${BACKEND_HOST_PORT:-9001}:9001"
    environment:
      CANCEL_FRONTEND_URL: ${LOCAL_CANCEL_FRONTEND_URL:-http://localhost:5173/citas/cancelar}

  caddy_proxy:
    profiles:
      - production
